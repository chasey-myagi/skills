<!doctype html>
<!--
  pdf-html 最简模板。

  使用前问清用户：配色、字体、页面尺寸、章节数、页码风格、是否暗色主题。
  所有 <PLACEHOLDER> 占位都需要替换。打印用 Chrome 现代版（原生支持 @page margin boxes）。
-->
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title><!-- TITLE --></title>

  <!--
    字体引入（按用户选择决定是否启用）。
    系统字体方案：删掉以下 link，--sans/--serif/--mono 用 ui-* 系统栈即可。
  -->
  <!--
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=<USER_FONTS>&display=swap">
  -->

  <style>
    /* ============== Tokens（由用户决定）============== */
    :root {
      /* Surface */
      --bg:      /* 页面外层背景    */ ;
      --paper:   /* sheet 纸面      */ ;
      --paper-2: /* 浅二级背景      */ ;

      /* Text */
      --ink:   /* 主标题/强文本 */ ;
      --text:  /* 正文          */ ;
      --muted: /* 次要文本      */ ;
      --faint: /* 灰边/标签     */ ;

      /* Accent（主色 + 辅助变体） */
      --accent:      /* 主强调色          */ ;
      --accent-dark: /* hover / 打印加深  */ ;
      --accent-soft: /* 强调色背景        */ ;
      --accent-line: /* 强调色细线/边框   */ ;

      /* Borders */
      --border:      /* 标准边框 */ ;
      --border-soft: /* 软边框   */ ;
      --rule:        /* 分隔线   */ ;

      /* Shadow */
      --shadow: 0 8px 40px -12px rgb(0 0 0 / 0.15);

      /* Fonts */
      --sans:  system-ui, sans-serif;
      --serif: ui-serif, Georgia, serif;
      --mono:  ui-monospace, "SF Mono", Menlo, monospace;
    }

    /* 可选：暗色主题（仅屏幕浏览；PDF 强制亮色） */
    [data-theme="dark"] {
      /* 由用户决定是否提供 */
    }

    *, *::before, *::after { box-sizing: border-box; }
    html { background: var(--bg); color: var(--ink); }
    body {
      margin: 0;
      font-family: var(--sans);
      font-size: 14.5px;
      line-height: 1.7;
      color: var(--text);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
    }

    /* ============== Sheet stack 布局 ============== */
    .sheet-wrap { padding: 32px 16px 64px; }

    .sheet {
      width: 100%;
      max-width: 210mm;
      margin: 0 auto 24px;
      padding: 22mm 20mm 24mm;
      background: var(--paper);
      box-shadow: var(--shadow);
      border-radius: 4px;
    }

    .sheet.cover {
      min-height: 257mm;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    h1, h2, h3, h4 { margin: 0; color: var(--ink); line-height: 1.15; }
    h1 { font-family: var(--serif); font-size: 44pt; line-height: 1.05; }
    h2 { font-family: var(--serif); font-size: 22pt; }
    h3 { font-family: var(--serif); font-size: 13pt; }
    p { max-width: 76ch; margin: 0 0 12px; }
    p.lead { font-size: 12pt; color: var(--ink); }

    /* ============== Section header ============== */
    .section-head {
      display: grid;
      grid-template-columns: auto 1fr;
      column-gap: 18px;
      align-items: end;
      margin-bottom: 18px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--rule);
    }
    .section-num {
      font-family: var(--mono);
      font-size: 28pt;
      font-weight: 700;
      color: var(--accent);
      line-height: 1;
    }
    .section-eyebrow {
      font-family: var(--mono);
      font-size: 8pt;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--faint);
      margin-bottom: 4px;
    }

    /* ============== 常见组件骨架 ============== */
    .callout {
      border: 1px solid var(--border-soft);
      border-left: 4px solid var(--accent);
      background: var(--accent-soft);
      padding: 12px 14px;
      border-radius: 3px;
      margin: 14px 0;
      font-size: 10.5pt;
      line-height: 1.6;
    }

    .card {
      border: 1px solid var(--border-soft);
      background: var(--paper);
      padding: 14px 15px;
      border-radius: 3px;
    }

    .pull-quote {
      margin: 16px 0;
      padding: 16px 18px 14px 22px;
      border-left: 3px solid var(--accent);
      background: var(--paper-2);
      font-family: var(--serif);
      font-size: 13pt;
      font-style: italic;
      color: var(--ink);
    }

    /* Tables */
    .table-wrap {
      margin: 14px 0;
      border: 1px solid var(--border-soft);
      border-radius: 3px;
      overflow-x: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 9.8pt;
      background: var(--paper);
    }
    th, td {
      padding: 8px 10px;
      text-align: left;
      vertical-align: top;
      border-bottom: 1px solid var(--border-soft);
    }
    th {
      background: var(--paper-2);
      font-size: 8.5pt;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    /* ============== Floating actions（仅屏幕） ============== */
    .floating-actions {
      position: fixed;
      right: 18px; bottom: 18px;
      z-index: 50;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .export-pdf-btn {
      background: var(--accent);
      color: var(--paper);
      border: 1px solid var(--accent);
      border-radius: 999px;
      padding: 7px 14px;
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: var(--shadow);
    }
    .export-pdf-btn:hover { background: var(--accent-dark); }

    /* ============== Print: A4 PDF ============== */
    /* Chrome / Edge 现代版本原生支持 @page margin boxes。
       注：margin box 内的颜色用 inline 值，不要 var(...)。 */
    @page {
      size: A4;
      margin: 16mm 16mm 22mm;

      @bottom-left {
        content: "<REPORT_TITLE> · <DATE>";
        font-family: ui-monospace, monospace;
        font-size: 8pt;
        color: <MUTED_INLINE_COLOR>;
        padding-top: 4mm;
        border-top: 0.5pt solid <BORDER_INLINE_COLOR>;
        width: 100%;
      }

      @bottom-right {
        content: "P. " counter(page) " / " counter(pages);
        font-family: ui-monospace, monospace;
        font-size: 8pt;
        font-weight: 700;
        color: <INK_INLINE_COLOR>;
        padding-top: 4mm;
        border-top: 0.5pt solid <BORDER_INLINE_COLOR>;
      }
    }

    /* 封面页不显示底栏 */
    @page :first {
      @bottom-left  { content: none; }
      @bottom-right { content: none; }
    }

    @media print {
      /* 强制亮色,覆盖 dark theme */
      :root, [data-theme="dark"] {
        /* 由用户填亮色 token */
      }

      html, body {
        background: #fff !important;
        font-size: 10.5pt;
        line-height: 1.55;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      .floating-actions { display: none !important; }

      .sheet-wrap { padding: 0; }
      .sheet {
        max-width: none;
        margin: 0; padding: 0;
        background: #fff;
        box-shadow: none;
        border-radius: 0;
        break-after: page;
      }
      .sheet:last-of-type { break-after: auto; }

      h1 { font-size: 36pt; }
      h2 { font-size: 18pt; }
      h3 { font-size: 12pt; }

      /* 短块不切开 */
      .callout, .card, .chart, .pull-quote, .stat, .verdict {
        break-inside: avoid;
      }

      /* ⚠️ 长表格必须允许跨页 */
      .table-wrap { overflow: visible; break-inside: auto; border-radius: 0; }
      table { min-width: 0; break-inside: auto; }

      /* 表头在每页重复 */
      thead { display: table-header-group; }

      /* 行不切开 */
      tr { break-inside: avoid; }

      /* 标题不孤立 */
      h2, h3, h4, .section-head { break-after: avoid-page; }
      .lead, .intro { break-after: avoid-page; }

      a { color: inherit; text-decoration: none; }
    }
  </style>
</head>
<body>

  <div class="floating-actions">
    <button class="export-pdf-btn" id="export-pdf-btn" type="button">导出 PDF</button>
  </div>

  <main class="sheet-wrap">

    <!-- ============== 封面 ============== -->
    <article class="sheet cover">
      <header>
        <!-- 顶部品牌条 / 日期 / TOC marker -->
      </header>

      <section>
        <h1><!-- 报告标题 --></h1>
        <p class="lead"><!-- 副标题 / 摘要(1-2 句) --></p>
      </section>

      <!-- 可选:meta 网格 -->
    </article>

    <!-- ============== 01 章节示例 ============== -->
    <article class="sheet">
      <header class="section-head">
        <div class="section-num">01</div>
        <div>
          <div class="section-eyebrow">SECTION EYEBROW</div>
          <h2>章节标题</h2>
        </div>
      </header>

      <p class="lead">
        章节导言,会自动 <em>避免</em> 与下面正文断开（break-after: avoid-page）。
      </p>

      <p>章节正文。</p>

      <div class="callout">
        <strong>提示：</strong> callout 在打印时不会被切到下一页。
      </div>
    </article>

    <!-- ============== 02 表格示例（验证跨页 + 表头重复）============== -->
    <article class="sheet">
      <header class="section-head">
        <div class="section-num">02</div>
        <div>
          <div class="section-eyebrow">TABLE EXAMPLE</div>
          <h2>表格示例</h2>
        </div>
      </header>

      <p>表格行数较多时会跨页,表头自动在每页重复。</p>

      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>列 A</th><th>列 B</th><th>列 C</th></tr>
          </thead>
          <tbody>
            <tr><td>row 1</td><td>...</td><td>...</td></tr>
            <tr><td>row 2</td><td>...</td><td>...</td></tr>
            <!-- ...更多行... -->
          </tbody>
        </table>
      </div>

      <div class="pull-quote">
        Pull quote 用于章节结尾点睛,打印时不会被切开。
      </div>
    </article>

  </main>

  <script>
    // 导出 PDF —— 现代 Chrome / Edge 原生支持 @page margin boxes,
    // 直接 window.print(),用户在打印对话框里选「另存为 PDF」即可。
    // ⚠️ 不要引入 paged.js polyfill,它会跟 sheet-stack 的 break-after 冲突。
    document.getElementById("export-pdf-btn")
      ?.addEventListener("click", () => window.print());

    // 可选:暗色主题切换(如用户需要)
    // const root = document.documentElement;
    // const stored = localStorage.getItem("report-theme");
    // if (stored) root.dataset.theme = stored;
  </script>
</body>
</html>
